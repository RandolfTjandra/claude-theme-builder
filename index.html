<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Theme Builder</title>
<style>
  :root{--bg:#1e1e2e;--fg:#cdd6f4;--panel:#181825;--line:#313244}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}
  #app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}
  #topbar{display:flex;gap:12px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  #main{display:grid;grid-template-columns:minmax(320px,420px) 1fr;min-height:0}
  #controls{overflow:auto;border-right:1px solid var(--line);padding:8px}
  #preview-wrap{overflow:auto;padding:16px}
  #jsonpane{border-top:1px solid var(--line);max-height:30vh;overflow:auto}
  #jsonpane[hidden]{display:none}
  @media(max-width:900px){#main{grid-template-columns:1fr}}
  #selfcheck{font-size:11px;opacity:.7;margin-left:auto}
  #controls .filter{width:100%;background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:4px;padding:4px 6px;font:inherit;margin-bottom:6px}
  .grp{margin:6px 0;border:1px solid var(--line);border-radius:6px;background:var(--panel)}
  .grp>summary{cursor:pointer;padding:6px 8px;font-weight:600;user-select:none}
  .row{display:grid;grid-template-columns:18px 28px 1fr 92px 22px;gap:6px;align-items:center;padding:3px 8px}
  .row .sw{width:18px;height:18px;border-radius:3px;border:1px solid var(--line)}
  .row input[type=color]{width:28px;height:22px;padding:0;border:none;background:none;cursor:pointer}
  .row input[type=text]{background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:4px;padding:2px 4px;font:inherit;width:100%}
  .row .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help}
  .row .rst{cursor:pointer;opacity:.3;border:none;background:none;color:var(--fg);font-size:14px;line-height:1}
  .row.ovr .rst{opacity:1;color:#f38ba8}
  #topbar input,#topbar select,#topbar button{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font:inherit}
  #topbar button{cursor:pointer}
  #export{background:#a6e3a1;color:#11111b;font-weight:700;border:none}
  #jsonpane{margin:0;padding:10px 12px;background:var(--panel);font-size:11px;white-space:pre}
  #preview{border:1px solid var(--ck-promptBorder,#888);border-radius:10px;padding:14px;color:var(--ck-text,#fff);background:#11111b;max-width:780px}
  #preview .seg{margin:7px 0}
  #preview [data-uses]{border-radius:4px}
  #preview [data-uses]:hover{outline:1px dashed var(--ck-warning,#eb0);outline-offset:1px}
  .pv-brand{color:var(--ck-claude);font-weight:700}
  .pv-spin{color:var(--ck-claudeBlue_FOR_SYSTEM_SPINNER)}
  .pv-mascot{display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--ck-clawd_body);outline:2px solid var(--ck-clawd_background);vertical-align:middle;margin-right:4px}
  .pv-lblC{color:var(--ck-briefLabelClaude);font-weight:700}
  .pv-lblY{color:var(--ck-briefLabelYou);font-weight:700}
  .pv-you{background:var(--ck-userMessageBackground);border-radius:6px;padding:3px 7px;display:inline-block}
  .pv-youH{background:var(--ck-userMessageBackgroundHover);border-radius:3px;padding:0 3px}
  .pv-diff{border-radius:6px;overflow:hidden;margin:7px 0}
  .pv-diff>div{padding:1px 6px}
  .pv-add{background:var(--ck-diffAdded)} .pv-del{background:var(--ck-diffRemoved)}
  .pv-addD{background:var(--ck-diffAddedDimmed)} .pv-delD{background:var(--ck-diffRemovedDimmed)}
  .pv-aw{color:var(--ck-diffAddedWord);font-weight:700} .pv-rw{color:var(--ck-diffRemovedWord);font-weight:700}
  .pv-menu{border:1px solid var(--ck-promptBorderShimmer);border-radius:6px;padding:3px;max-width:320px}
  .pv-menu .it{padding:1px 6px;border-radius:3px;color:var(--ck-subtle)}
  .pv-menu .sel{background:var(--ck-selectionBg);color:var(--ck-text)}
  .pv-match{color:var(--ck-suggestion);font-weight:700} .pv-dim{color:var(--ck-inactive)}
  .pv-prompt{border:1px solid var(--ck-promptBorder);border-radius:6px;padding:4px 7px}
  .pv-inv{background:var(--ck-claude);color:var(--ck-inverseText);padding:0 5px;border-radius:3px;font-weight:700}
  .pv-ph{color:var(--ck-inactiveShimmer)}
  .pv-bash{border-left:3px solid var(--ck-bashBorder);background:var(--ck-bashMessageBackgroundColor);padding:3px 8px;border-radius:0 4px 4px 0}
  .pv-plan{border:1px solid var(--ck-planMode);color:var(--ck-planMode);border-radius:6px;padding:3px 8px;display:inline-block}
  .pv-perm{border:1px solid var(--ck-permission);border-radius:6px;padding:4px 8px}
  .pv-perm .sh{color:var(--ck-permissionShimmer)} .pv-perm .ok{color:var(--ck-merged);font-weight:700}
  .pv-perm .aa{color:var(--ck-autoAccept)} .pv-perm .aas{color:var(--ck-autoAcceptShimmer)}
  .pv-ide{color:var(--ck-ide)}
  .pv-mem{background:var(--ck-memoryBackgroundColor);border-radius:6px;padding:3px 8px}
  .pv-mem b{color:var(--ck-remember)}
  .pv-rl{height:8px;border-radius:4px;background:var(--ck-rate_limit_empty);max-width:240px}
  .pv-rl>i{display:block;height:100%;width:55%;border-radius:4px;background:var(--ck-rate_limit_fill)}
  .pv-chip{display:inline-block;padding:1px 7px;border-radius:10px;margin:2px 3px 2px 0;border:1px solid currentColor;font-size:12px}
  .pv-agent{display:inline-block;padding:1px 7px;border-radius:4px;margin:2px 3px 2px 0;font-weight:700}
</style></head>
<body><div id="app">
  <div id="topbar"><strong>Claude Theme Builder</strong><span id="selfcheck"></span></div>
  <div id="main"><div id="controls"></div><div id="preview-wrap"><div id="preview"></div></div></div>
  <pre id="jsonpane" hidden></pre>

const CTB = window.CTB = { checks: [] };
function check(name, fn){ let ok=false; try{ ok=!!fn(); }catch(e){ ok=false; } CTB.checks.push({name, ok}); }
function runChecks(){
  const pass = CTB.checks.filter(c=>c.ok).length, total = CTB.checks.length;
  CTB.checks.forEach(c=>!c.ok && console.error('CHECK FAIL:', c.name));
  console.log(`self-checks: ${pass}/${total}`);
  const el=document.getElementById('selfcheck');
  if(el) el.textContent = `checks ${pass}/${total}`, el.style.color = pass===total ? '#a6e3a1':'#f38ba8';
}

];
CTB.SCHEMA.forEach(g=>g.keys.forEach(k=> k.label = k.label || k.key));
CTB.ALL_KEYS = CTB.SCHEMA.flatMap(g=>g.keys.map(k=>k.key));
CTB.ANSI_HEX = { // standard 16-color terminal palette
 black:'#000000',red:'#CD3131',green:'#0DBC79',yellow:'#E5E510',blue:'#2472C8',
 magenta:'#BC3FBC',cyan:'#11A8CD',white:'#E5E5E5',
 blackBright:'#666666',redBright:'#F14C4C',greenBright:'#23D18B',yellowBright:'#F5F543',
 blueBright:'#3B8EEA',magentaBright:'#D670D6',cyanBright:'#29B8DB',whiteBright:'#FFFFFF' };

function normHex(v){
  if(!v) return '#000000';
  v=String(v).trim();
  if(v.startsWith('ansi:')) v = CTB.ANSI_HEX[v.slice(5)] || '#000000';
  let m=v.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/i);
  if(m){ return '#'+[1,2,3].map(i=>(+m[i]).toString(16).padStart(2,'0')).join('').toUpperCase(); }
  m=v.match(/^#([0-9a-f]{3})$/i);
  if(m){ return '#'+m[1].split('').map(c=>c+c).join('').toUpperCase(); }
  m=v.match(/^#([0-9a-f]{6})$/i);
  if(m){ return ('#'+m[1]).toUpperCase(); }
  return '#000000';
}

function syncRow(key){
  const row=document.querySelector(`#controls [data-key="${key}"]`); if(!row) return;
  const hex=effective(CTB.state,key);
  row.querySelector('.sw').style.background=hex;
  row.querySelector('input[type=color]').value=hex;
  const tx=row.querySelector('input[type=text]'); if(document.activeElement!==tx) tx.value=hex;
  row.classList.toggle('ovr', key in CTB.state.overrides);
}
function setKey(key,hex){ CTB.state.overrides[key]=normHex(hex); applyVars(); syncRow(key); renderJSON(); }
function resetKey(key){ delete CTB.state.overrides[key]; applyVars(); syncRow(key); renderJSON(); }
function renderControls(){
  const root=document.getElementById('controls'); root.innerHTML='';
  const f=document.createElement('input'); f.className='filter'; f.placeholder='filter keys…';
  f.oninput=()=>{ const q=f.value.toLowerCase();
    document.querySelectorAll('#controls .row').forEach(r=>{
      r.style.display=(r.dataset.key.toLowerCase().includes(q)||r.dataset.label.toLowerCase().includes(q))?'':'none'; }); };
  root.appendChild(f);
  for(const g of CTB.SCHEMA){
    const d=document.createElement('details'); d.className='grp'; d.open=true;
    d.innerHTML=`<summary>${g.group}</summary>`;
    for(const k of g.keys){
      const row=document.createElement('div'); row.className='row'; row.dataset.key=k.key; row.dataset.label=k.label;
      row.innerHTML=`<span class="sw"></span><input type="color">`+
        `<span class="name" title="${k.key} — ${k.hint}">${k.label}</span>`+
        `<input type="text" spellcheck="false"><button class="rst" title="reset to base">⟲</button>`;
      row.querySelector('input[type=color]').oninput=e=>setKey(k.key,e.target.value);
      const tx=row.querySelector('input[type=text]');
      tx.onchange=e=>{ let v=e.target.value.trim(); if(!v.startsWith('#'))v='#'+v;
        if(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v)) setKey(k.key,v); else syncRow(k.key); };
      row.querySelector('.rst').onclick=()=>resetKey(k.key);
      d.appendChild(row);
    }
    root.appendChild(d);
  }
}

function loadPreset(name){
  const p=CTB.PRESETS[name]; if(!p) return;
  CTB.state={ name:p.name, base:p.base, overrides:deep(p.overrides) };
  document.getElementById('name').value=CTB.state.name;
  document.getElementById('base').value=CTB.state.base;
  applyVars(); CTB.ALL_KEYS.forEach(syncRow); renderJSON();
}
function renderTopbar(){
  const bar=document.getElementById('topbar'); const sc=document.getElementById('selfcheck');
  const span=document.createElement('span'); span.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap';
  span.innerHTML=`name <input id="name" size="14" value="${CTB.state.name}">`+
    `base <select id="base">`+['dark-ansi','light-ansi','dark','light'].map(b=>`<option ${b===CTB.state.base?'selected':''}>${b}</option>`).join('')+`</select>`+
    `<select id="preset"><option value="">load preset…</option>`+Object.keys(CTB.PRESETS).map(n=>`<option>${n}</option>`).join('')+`</select>`+
    `<button id="export">Copy JSON</button><button id="togglejson">JSON</button>`;
  bar.insertBefore(span, sc);
  document.getElementById('name').oninput=e=>{ CTB.state.name=e.target.value; renderJSON(); };
  document.getElementById('base').onchange=e=>{ CTB.state.base=e.target.value; applyVars(); CTB.ALL_KEYS.forEach(syncRow); renderJSON(); };
  document.getElementById('preset').onchange=e=>{ if(e.target.value) loadPreset(e.target.value); };
  document.getElementById('export').onclick=copyJSON;
  document.getElementById('togglejson').onclick=()=>{ const p=document.getElementById('jsonpane'); p.hidden=!p.hidden; renderJSON(); };
}
function exportJSON(){
  const o={name:CTB.state.name, base:CTB.state.base, overrides:{}};
  for(const k of Object.keys(CTB.state.overrides)) o.overrides[k]=normHex(CTB.state.overrides[k]);
  return JSON.stringify(o,null,2);
}
function renderJSON(){ const p=document.getElementById('jsonpane'); if(p) p.textContent=exportJSON(); }
function toast(msg){ const el=document.getElementById('selfcheck'); const prev=el.textContent; el.textContent=msg; setTimeout(()=>el.textContent=prev,1500); }
function fallback(s,done){ const t=document.createElement('textarea'); t.value=s; document.body.appendChild(t); t.select(); try{document.execCommand('copy');}catch(e){} t.remove(); done(); }
function copyJSON(){ const s=exportJSON(); const done=()=>toast('copied ✓');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(s).then(done).catch(()=>fallback(s,done));
  else fallback(s,done); }
function init(){
  renderPreview(); renderControls(); renderTopbar();
  applyVars(); CTB.ALL_KEYS.forEach(syncRow); renderJSON();
  check('schema has 57 unique keys', ()=> CTB.ALL_KEYS.length===57 && new Set(CTB.ALL_KEYS).size===57);
  check('normHex upper', ()=> normHex('#bd93f9')==='#BD93F9' && normHex('rgb(189,147,249)')==='#BD93F9');
  check('bases cover all keys', ()=> ['dark-ansi','light-ansi','dark','light'].every(b=> CTB.ALL_KEYS.every(k=> /^#[0-9A-F]{6}$/.test(CTB.BASES[b][k]))));
  check('effective prefers override', ()=> effective({base:'dark-ansi',overrides:{text:'#123456'}},'text')==='#123456');
  check('controls render a row per key', ()=> document.querySelectorAll('#controls [data-key]').length===57);
  check('applyVars sets a css var', ()=> getComputedStyle(document.getElementById('preview')).getPropertyValue('--ck-text').trim()!=='');
  check('every key shown in preview', ()=>{ const used=new Set();
    document.querySelectorAll('#preview [data-uses]').forEach(el=>el.dataset.uses.split(/\s+/).forEach(k=>used.add(k)));
    return CTB.ALL_KEYS.every(k=>used.has(k)); });
  check('11 presets embedded', ()=> Object.keys(CTB.PRESETS).length===11);
  check('export shape valid', ()=>{ const o=JSON.parse(exportJSON()); return !!o.name && !!o.base && !!o.overrides; });
  runChecks();
}
document.addEventListener('DOMContentLoaded', init);
</script></body></html>
